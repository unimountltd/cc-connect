name: Release (main rolling)

# Publishes a rolling pre-release tagged "main" with binaries for every push
# to main that passes CI. Users on the bleeding edge install with:
#
#     cc-connect update --channel main
#
# The release tag is fixed at "main" so the updater can fetch it via
# /repos/.../releases/tags/main. The actual binary version is embedded as
# main-<short-sha> via the Makefile's VERSION variable.

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

permissions:
  contents: write

jobs:
  publish-main:
    # Only run when the upstream CI run finished successfully on main.
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the commit that passed CI
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build web assets
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Compute rolling version
        id: ver
        run: |
          set -euo pipefail
          SHA=$(git rev-parse --short HEAD)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "ver=main-$SHA" >> "$GITHUB_OUTPUT"

      - name: Build all platforms
        run: make release-all VERSION=${{ steps.ver.outputs.ver }}

      - name: Refresh rolling 'main' release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Best-effort cleanup of the existing rolling release and tag.
          gh release delete main --yes 2>/dev/null || true
          git push origin :refs/tags/main 2>/dev/null || true

          gh release create main \
            --prerelease \
            --target "${{ github.event.workflow_run.head_sha }}" \
            --title "main (rolling, ${{ steps.ver.outputs.ver }})" \
            --notes "Rolling build from main @ \`${{ steps.ver.outputs.sha }}\`. **Unstable** — for testing only.

          Install with:

              cc-connect update --channel main" \
            dist/cc-connect-${{ steps.ver.outputs.ver }}-* \
            dist/checksums.txt
