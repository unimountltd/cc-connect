name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-arm64
            runs-on: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - name: darwin-arm64
            runs-on: macos-14
            goos: darwin
            goarch: arm64
    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build web assets
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Download dependencies
        run: go mod download
        env:
          GOPROXY: https://proxy.golang.org,direct

      - name: Build cc-connect
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          set -euo pipefail
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME:-dev}"
          OUT="dist/cc-connect-${{ matrix.name }}"
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "${OUT}" ./cmd/cc-connect

      - name: Smoke check binary
        run: file "dist/cc-connect-${{ matrix.name }}" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cc-connect-${{ matrix.name }}
          path: dist/cc-connect-${{ matrix.name }}
          if-no-files-found: error
          retention-days: 14

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/cc-connect-${{ matrix.name }}
